<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Note Organizer - Folders</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --sidebar-bg: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .folder-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .folder-btn.active { background: var(--primary); }
        .folder-btn:hover:not(.active) { background: rgba(255,255,255,0.2); }

        /* Main Content Area */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-folder { background: #6366f1; color: white; width: 100%; margin-bottom: 20px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        #fileInput { display: none; }

        #note-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .note-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
            cursor: grab;
            border: 2px solid transparent;
            transition: border 0.3s;
        }

        .note-card:hover { border-color: var(--primary); }
        .note-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: zoom-in; }

        .page-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lightbox img { max-width: 100%; max-height: 100%; border-radius: 4px; }
        #lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; order: 2; padding: 10px; }
            main { order: 1; }
            #note-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <button class="btn btn-folder" onclick="createNewFolder()">+ New Folder</button>
        <div id="folder-list"></div>
    </aside>

    <main>
        <header>
            <div>
                <h2 id="current-folder-name" style="margin:0">Default Folder</h2>
                <p style="color:#64748b; font-size: 14px;">Arrange and Export to PDF</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    Add Note
                </button>
                <button class="btn btn-success" onclick="exportToPDF()">
                    Download PDF
                </button>
            </div>
        </header>

        <input type="file" id="fileInput" accept="image/*" multiple>
        <div id="note-container"></div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        const container = document.getElementById('note-container');
        const fileInput = document.getElementById('fileInput');
        const folderListDisplay = document.getElementById('folder-list');
        const folderTitle = document.getElementById('current-folder-name');
        
        let folders = { "Default Folder": [] };
        let currentFolder = "Default Folder";

        // 1. Load Data
        window.onload = () => {
            const savedFolders = localStorage.getItem('note_folders');
            if (savedFolders) {
                folders = JSON.parse(savedFolders);
            }
            renderFolders();
            loadFolder(Object.keys(folders)[0]);
        };

        function createNewFolder() {
            const name = prompt("Enter folder name:");
            if (name && !folders[name]) {
                folders[name] = [];
                saveAll();
                renderFolders();
                loadFolder(name);
            }
        }

        function renderFolders() {
            folderListDisplay.innerHTML = '';
            Object.keys(folders).forEach(name => {
                const btn = document.createElement('button');
                btn.className = `folder-btn ${currentFolder === name ? 'active' : ''}`;
                btn.innerHTML = `<span>📁 ${name}</span>`;
                btn.onclick = () => loadFolder(name);
                folderListDisplay.appendChild(btn);
            });
        }

        function loadFolder(name) {
            currentFolder = name;
            folderTitle.innerText = name;
            renderFolders();
            renderNotes();
        }

        // 2. Uploads
        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const base64 = await compressImage(file);
                folders[currentFolder].push({ id: Date.now() + Math.random(), src: base64 });
            }
            saveAll();
            renderNotes();
            fileInput.value = "";
        });

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        // 3. Render Notes
        function renderNotes() {
            container.innerHTML = '';
            const currentNotes = folders[currentFolder];
            currentNotes.forEach((note, index) => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.draggable = true;
                card.dataset.id = note.id;
                card.innerHTML = `
                    <div class="page-badge">Page ${index + 1}</div>
                    <button class="remove-btn" onclick="removeNote('${note.id}')">&times;</button>
                    <img src="${note.src}" onclick="openLightbox('${note.src}')">
                `;
                card.addEventListener('dragstart', () => card.classList.add('dragging'));
                card.addEventListener('dragend', () => {
                    card.classList.remove('dragging');
                    reorderArray();
                });
                container.appendChild(card);
            });
        }

        function removeNote(id) {
            folders[currentFolder] = folders[currentFolder].filter(n => n.id != id);
            saveAll();
            renderNotes();
        }

        function saveAll() {
            try {
                localStorage.setItem('note_folders', JSON.stringify(folders));
            } catch (e) {
                alert("Storage full! Please delete some images.");
            }
        }

        // 4. Drag & Drop
        container.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            const afterElement = getDragAfterElement(container, e.clientY);
            if (afterElement == null) container.appendChild(dragging);
            else container.insertBefore(dragging, afterElement);
        });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.note-card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function reorderArray() {
            const currentCards = [...container.querySelectorAll('.note-card')];
            folders[currentFolder] = currentCards.map(card => 
                folders[currentFolder].find(n => n.id == card.dataset.id)
            );
            saveAll();
            renderNotes();
        }

        // 5. PDF & Lightbox
        async function exportToPDF() {
            const notes = folders[currentFolder];
            if (notes.length === 0) return alert("Folder is empty.");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            for (let i = 0; i < notes.length; i++) {
                if (i > 0) pdf.addPage();
                pdf.addImage(notes[i].src, 'JPEG', 10, 10, 190, 270, undefined, 'FAST');
                pdf.text(`Page ${i + 1}`, 105, 290, { align: 'center' });
            }
            pdf.save(`${currentFolder}_Notes.pdf`);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
