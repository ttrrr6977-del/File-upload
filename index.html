<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Note Organizer - Multi-Folder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --tab-inactive: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px 20px 80px 20px; /* Added bottom padding for footer space */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Folder System Styles */
        .folder-bar {
            width: 100%;
            max-width: 900px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 5px;
            scrollbar-width: thin;
        }

        .folder-tab {
            padding: 8px 16px;
            background: var(--tab-inactive);
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
        }

        .folder-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .delete-folder {
            font-size: 18px;
            line-height: 1;
            opacity: 0.6;
            transition: 0.2s;
        }

        .delete-folder:hover { opacity: 1; color: var(--danger); }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        #fileInput { display: none; }

        #note-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .note-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            position: relative;
            cursor: grab;
            border: 2px solid transparent;
        }

        .note-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            cursor: zoom-in;
        }

        .page-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #lightbox img { max-width: 100%; max-height: 100%; }

        /* Stylish Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0;
            padding: 15px 0;
            text-align: center;
            font-size: 14px;
            color: #64748b;
            z-index: 100;
        }

        footer b {
            color: var(--primary);
        }

        @media (max-width: 600px) {
            #note-container { grid-template-columns: repeat(2, 1fr); }
            header { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn btn-outline" onclick="addNewFolder()">+ New Folder</button>
            <div>
                <h2 style="margin:0; font-size: 1.2rem;">Note Organizer</h2>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Add Note</button>
            <button class="btn btn-success" onclick="exportToPDF()">PDF</button>
        </div>
    </header>

    <div class="folder-bar" id="folderBar"></div>

    <input type="file" id="fileInput" accept="image/*" multiple>
    <div id="note-container"></div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <footer>
        Made with ❤️ by <b>Biraj Biswas</b> | Web Developer
    </footer>

    <script>
        const container = document.getElementById('note-container');
        const folderBar = document.getElementById('folderBar');
        const fileInput = document.getElementById('fileInput');
        
        let projectData = {
            activeFolderId: "default",
            folders: [
                { id: "default", name: "Main Notes", notes: [] }
            ]
        };

        window.onload = () => {
            const saved = localStorage.getItem('note_app_data');
            if (saved) {
                try {
                    projectData = JSON.parse(saved);
                } catch(e) { console.error("Data error", e); }
            }
            renderFolders();
            renderNotes();
        };

        function addNewFolder() {
            const name = prompt("Enter folder name:", "New Folder");
            if (!name) return;
            const newFolder = { id: 'f-' + Date.now(), name: name, notes: [] };
            projectData.folders.push(newFolder);
            projectData.activeFolderId = newFolder.id;
            saveData();
            renderFolders();
            renderNotes();
        }

        function deleteFolder(id, e) {
            e.stopPropagation();
            if (projectData.folders.length === 1) return alert("Cannot delete the last folder.");
            if (!confirm("Delete this folder and all images inside?")) return;
            
            projectData.folders = projectData.folders.filter(f => f.id !== id);
            if (projectData.activeFolderId === id) projectData.activeFolderId = projectData.folders[0].id;
            
            saveData();
            renderFolders();
            renderNotes();
        }

        function switchFolder(id) {
            projectData.activeFolderId = id;
            saveData();
            renderFolders();
            renderNotes();
        }

        function renderFolders() {
            folderBar.innerHTML = '';
            projectData.folders.forEach(folder => {
                const isActive = folder.id === projectData.activeFolderId;
                const tab = document.createElement('div');
                tab.className = `folder-tab ${isActive ? 'active' : ''}`;
                tab.onclick = () => switchFolder(folder.id);
                tab.innerHTML = `
                    ${folder.name} 
                    <span class="delete-folder" onclick="deleteFolder('${folder.id}', event)">&times;</span>
                `;
                folderBar.appendChild(tab);
            });
        }

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            const activeFolder = projectData.folders.find(f => f.id === projectData.activeFolderId);
            
            for (const file of files) {
                const base64 = await compressImage(file);
                activeFolder.notes.push({ id: Date.now() + Math.random(), src: base64 });
            }
            saveData();
            renderNotes();
            fileInput.value = "";
        });

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        function renderNotes() {
            container.innerHTML = '';
            const activeFolder = projectData.folders.find(f => f.id === projectData.activeFolderId);
            
            activeFolder.notes.forEach((note, index) => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.draggable = true;
                card.dataset.id = note.id;
                card.innerHTML = `
                    <div class="page-badge">Page ${index + 1}</div>
                    <button class="remove-btn" onclick="removeNote('${note.id}')">&times;</button>
                    <img src="${note.src}" onclick="openLightbox('${note.src}')">
                `;
                card.addEventListener('dragstart', () => card.classList.add('dragging'));
                card.addEventListener('dragend', () => { card.classList.remove('dragging'); reorderArray(); });
                container.appendChild(card);
            });
        }

        function removeNote(id) {
            const activeFolder = projectData.folders.find(f => f.id === projectData.activeFolderId);
            activeFolder.notes = activeFolder.notes.filter(n => n.id != id);
            saveData();
            renderNotes();
        }

        container.addEventListener('dragover', e => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            const afterElement = getDragAfterElement(container, e.clientY);
            if (afterElement == null) container.appendChild(dragging);
            else container.insertBefore(dragging, afterElement);
        });

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.note-card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function reorderArray() {
            const activeFolder = projectData.folders.find(f => f.id === projectData.activeFolderId);
            const currentCards = [...container.querySelectorAll('.note-card')];
            activeFolder.notes = currentCards.map(card => activeFolder.notes.find(n => n.id == card.dataset.id));
            saveData();
            renderNotes();
        }

        function saveData() {
            try {
                localStorage.setItem('note_app_data', JSON.stringify(projectData));
            } catch (e) { alert("Storage full! Remove some images."); }
        }

        async function exportToPDF() {
            const activeFolder = projectData.folders.find(f => f.id === projectData.activeFolderId);
            if (activeFolder.notes.length === 0) return alert("No images in this folder.");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            for (let i = 0; i < activeFolder.notes.length; i++) {
                if (i > 0) pdf.addPage();
                pdf.addImage(activeFolder.notes[i].src, 'JPEG', 10, 10, 190, 270, undefined, 'FAST');
                pdf.text(`Folder: ${activeFolder.name} - Page ${i + 1}`, 105, 290, { align: 'center' });
            }
            pdf.save(`${activeFolder.name}.pdf`);
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
